        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

  GetArticlesByDistrictFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt PublicReadFunctionRole.Arn
      Handler: src/functions/getArticlesByDistrict/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
