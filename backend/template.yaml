            RestApiId: !Ref PublicApi
            Path: /api/v1/districts/{districtSlug}/articles
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/getArticlesByDistrict/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

  GetArticlesByStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt PublicReadFunctionRole.Arn
      Handler: src/functions/getArticlesByState/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref PublicApi
            Path: /api/v1/states/{stateSlug}/articles
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/getArticlesByState/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

  GetBreakingNewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt PublicReadFunctionRole.Arn
      Handler: src/functions/getBreakingNews/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref PublicApi
            Path: /api/v1/breaking-news
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/getBreakingNews/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

  GetFeaturedArticlesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt PublicReadFunctionRole.Arn
      Handler: src/functions/getFeaturedArticles/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
