AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sonvani Hindi News Portal backend foundation.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  LogLevel:
    Type: String
    Default: info
    AllowedValues:
      - debug
      - info
      - warn
      - error
  AllowedCorsOrigin:
    Type: String
    Default: '*'
  CognitoUserPoolId:
    Type: String

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT_NAME: !Ref EnvironmentName
        LOG_LEVEL: !Ref LogLevel
        ARTICLES_TABLE_NAME: !Ref ArticlesTable
        MEDIA_BUCKET_NAME: !Ref MediaBucket
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId

Resources:
  PublicApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref EnvironmentName
      EndpointConfiguration: REGIONAL
      TracingEnabled: true

      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}

        AddDefaultAuthorizerToCorsPreflight: false

      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Requested-With'"
        AllowOrigin: !Sub "'${AllowedCorsOrigin}'"
        MaxAge: "'600'"

      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          ThrottlingBurstLimit: 200
          ThrottlingRateLimit: 100

  ArticlesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: categorySlug
          AttributeType: S
        - AttributeName: districtSlug
          AttributeType: S
        - AttributeName: stateSlug
          AttributeType: S
        - AttributeName: publishDate
          AttributeType: S
        - AttributeName: breakingPartition
          AttributeType: S
        - AttributeName: featuredPartition
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI_BySlug
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_ByCategory
          KeySchema:
            - AttributeName: categorySlug
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_ByDistrict
          KeySchema:
            - AttributeName: districtSlug
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_ByState
          KeySchema:
            - AttributeName: stateSlug
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_BreakingNews
          KeySchema:
            - AttributeName: breakingPartition
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_FeaturedArticles
          KeySchema:
            - AttributeName: featuredPartition
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: sonvani
        - Key: Environment
          Value: !Ref EnvironmentName

  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - GET
              - HEAD
              - PUT
            AllowedOrigins:
              - !Ref AllowedCorsOrigin
            AllowedHeaders:
              - '*'
            MaxAge: 3600
      Tags:
        - Key: Application
          Value: sonvani
        - Key: Environment
          Value: !Ref EnvironmentName
  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadImages
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource: !Sub '${MediaBucket.Arn}/*'

  PublicReadFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sonvani-public-read-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadArticlesTable
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ArticlesTable.Arn
                  - !Sub '${ArticlesTable.Arn}/index/*'
              - Sid: ReadMediaObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${MediaBucket.Arn}/*'

  ArticleWriteFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: sonvani-article-write-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteArticles
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ArticlesTable.Arn
                  - !Sub '${ArticlesTable.Arn}/index/*'

              - Sid: UploadMedia
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:PutObjectAcl
                Resource: !Sub '${MediaBucket.Arn}/*'
              - Sid: CognitoUserManagement
                Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminResetUserPassword
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminRemoveUserFromGroup
                  - cognito-idp:AdminListGroupsForUser
                Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt ArticleWriteFunctionRole.Arn
      Handler: src/functions/getUploadUrl/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref PublicApi
            Path: /api/v1/admin/media/upload-url
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/getUploadUrl/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022
