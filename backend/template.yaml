AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hindi News Portal backend foundation.

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        ARTICLES_TABLE_NAME: !Ref ArticlesTable

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  ArticlesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub HindiNewsArticles-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: categorySlug
          AttributeType: S
        - AttributeName: districtSlug
          AttributeType: S
        - AttributeName: stateSlug
          AttributeType: S
        - AttributeName: publishDate
          AttributeType: S
        - AttributeName: breakingPartition
          AttributeType: S
        - AttributeName: featuredPartition
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI_BySlug
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_ByCategory
          KeySchema:
            - AttributeName: categorySlug
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_ByDistrict
          KeySchema:
            - AttributeName: districtSlug
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_ByState
          KeySchema:
            - AttributeName: stateSlug
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_BreakingNews
          KeySchema:
            - AttributeName: breakingPartition
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_FeaturedArticles
          KeySchema:
            - AttributeName: featuredPartition
              KeyType: HASH
            - AttributeName: publishDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hindi-news-portal-media-${EnvironmentName}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hindi-news-portal-frontend-${EnvironmentName}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  ArticlesTableName:
    Description: DynamoDB articles table name.
    Value: !Ref ArticlesTable
  MediaBucketName:
    Description: S3 media bucket name.
    Value: !Ref MediaBucket
  FrontendBucketName:
    Description: S3 frontend bucket name.
    Value: !Ref FrontendBucket
