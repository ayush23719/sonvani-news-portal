    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/getFeaturedArticles/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

  SearchArticlesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt PublicReadFunctionRole.Arn
      Handler: src/functions/searchArticles/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref PublicApi
            Path: /api/v1/search
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/searchArticles/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

  GetSitemapDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt PublicReadFunctionRole.Arn
      Handler: src/functions/getSitemapData/app.handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref PublicApi
            Path: /api/v1/sitemap/articles
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/getSitemapData/app.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2022

Outputs:
  PublicApiUrl:
    Description: Public API Gateway base URL.
    Value: !Sub 'https://${PublicApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/api/v1'
  ArticlesTableName:
    Description: DynamoDB articles table name.
    Value: !Ref ArticlesTable
  MediaBucketName:
    Description: S3 media bucket name.
    Value: !Ref MediaBucket
  PublicReadFunctionRoleArn:
    Description: IAM role used by public read Lambda functions.
    Value: !GetAtt PublicReadFunctionRole.Arn
